<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopMaster | Tu tienda online</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- CSS Propio -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="fa-solid fa-cart-shopping"></i> ShopMaster</a>
            <button class="btn btn-outline-light position-relative" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
                <i class="fa-solid fa-cart-arrow-down"></i> Mi Carrito
                <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success">0</span>
            </button>
        </div>
    </nav>

    <!-- Header -->
    <header class="bg-light py-5 text-center shadow-sm">
        <div class="container">
            <h1 class="display-4 fw-bold text-dark">Descubre nuestros productos 🛍️</h1>
            <p class="lead text-secondary">Calidad y precio a un clic de distancia.</p>
        </div>
    </header>

    <!-- Contenedor de Productos -->
    <main class="container py-5">
        <div class="row g-4" id="products-container">
            <!-- Los productos se inyectarán aquí con JavaScript -->
            <div class="text-center w-100">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Detalles del Producto -->
    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modal-title">Detalles del Producto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body row g-4">
                    <div class="col-md-6 text-center">
                        <img id="modal-img" src="" alt="" class="img-fluid rounded shadow-sm" style="max-height: 300px; object-fit: contain;">
                    </div>
                    <div class="col-md-6 d-flex flex-column justify-content-center">
                        <span class="badge bg-secondary mb-2 align-self-start" id="modal-category"></span>
                        <h4 id="modal-name" class="fw-bold"></h4>
                        <p id="modal-desc" class="text-muted"></p>
                        <h3 class="text-success fw-bold">$<span id="modal-price"></span></h3>
                        <div class="d-flex align-items-center mt-3">
                            <input type="number" id="modal-qty" class="form-control me-2 w-25" value="1" min="1">
                            <button id="btn-add-cart" class="btn btn-primary w-100"><i class="fa-solid fa-plus"></i> Agregar al carrito</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Offcanvas Carrito -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas">
        <div class="offcanvas-header bg-light">
            <h5 class="offcanvas-title"><i class="fa-solid fa-cart-shopping"></i> Tu Carrito</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div id="cart-items" class="flex-grow-1 overflow-auto">
                <!-- Items del carrito -->
            </div>
            <div class="border-top pt-3 mt-3">
                <h4 class="d-flex justify-content-between fw-bold">Total: <span class="text-success">$<span id="cart-total">0.00</span></span></h4>
                <button class="btn btn-success w-100 mt-2" data-bs-toggle="modal" data-bs-target="#paymentModal"><i class="fa-regular fa-credit-card"></i> Ir a Pagar</button>
            </div>
        </div>
    </div>

    <!-- Modal Pasarela de Pago -->
    <div class="modal fade" id="paymentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title"><i class="fa-solid fa-lock"></i> Pago Seguro</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="payment-form">
                        <div class="mb-3">
                            <label class="form-label">Nombre Completo</label>
                            <input type="text" id="pay-name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Número de Tarjeta</label>
                            <input type="text" class="form-control" placeholder="0000 0000 0000 0000" maxlength="16" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Vencimiento</label>
                                <input type="text" class="form-control" placeholder="MM/AA" maxlength="5" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">CVV</label>
                                <input type="password" class="form-control" placeholder="123" maxlength="3" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold fs-5 mt-2">Pagar Ahora ✅</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- jsPDF para el ticket -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JS Propio -->
    <script src="app.js"></script>
</body>
</html>
